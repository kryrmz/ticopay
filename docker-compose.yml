# Postgres local para desarrollo (coincide con el DATABASE_URL por defecto de config.go).
# Uso:  docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: ticopay-db
    environment:
      POSTGRES_USER: ticopay
      POSTGRES_PASSWORD: ticopay_dev
      POSTGRES_DB: ticopay
    ports:
      - '5433:5432'
    volumes:
      - ticopay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ticopay -d ticopay']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ticopay_pgdata:
